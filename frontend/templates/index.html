<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="emoji">🎭</span>
                <h1>EmotionAI</h1>
            </div>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Initialisation...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Video Section -->
            <div class="video-section">
                <div class="video-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    <canvas id="overlay"></canvas>
                    <div class="video-placeholder" id="placeholder">
                        <div class="placeholder-content">
                            <span class="icon">📷</span>
                            <p>Cliquez sur "Démarrer la caméra"</p>
                        </div>
                    </div>
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>
                        <p>Analyse en cours...</p>
                    </div>
                </div>
                
                <!-- Controls -->
                <div class="controls">
                    <button id="startBtn" class="btn btn-primary">
                        <span>▶️</span> Démarrer la caméra
                    </button>
                    <button id="stopBtn" class="btn btn-secondary" disabled>
                        <span>⏹️</span> Arrêter
                    </button>
                    <div class="fps-counter" id="fpsCounter">0 FPS</div>
                </div>
            </div>

            <!-- Results Panel -->
            <div class="results-panel">
                <h2>📊 Résultats de l'analyse</h2>
                
                <div id="noFaces" class="no-faces">
                    <p>Aucun visage détecté</p>
                </div>

                <div id="resultsContent" class="results-content hidden">
                    <!-- Primary Emotion -->
                    <div class="primary-emotion">
                        <div class="emotion-icon" id="emotionIcon">😐</div>
                        <div class="emotion-info">
                            <h3 id="primaryEmotion">Neutral</h3>
                            <div class="confidence-bar">
                                <div class="confidence-fill" id="confidenceFill"></div>
                                <span id="confidenceText">0%</span>
                            </div>
                        </div>
                    </div>

                    <!-- All Probabilities -->
                    <div class="probabilities">
                        <h4>Distribution des émotions</h4>
                        <div id="probabilitiesList" class="probabilities-list">
                            <!-- Generated by JS -->
                        </div>
                    </div>

                    <!-- Stats -->
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-value" id="facesCount">0</span>
                            <span class="stat-label">Visages détectés</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="inferenceTime">0</span>
                            <span class="stat-label">ms inference</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by TensorFlow & Flask</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
